<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ArborView</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">◤</span>
        <h1>ArborView</h1>
        <span class="tagline">interactive CART visualizer</span>
      </div>
      <nav class="tab-nav" role="tablist" aria-label="App sections">
        <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="panel-visualizer" id="tab-visualizer">Visualizer</button>
        <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-about"      id="tab-about">About</button>
      </nav>
      <div class="controls">
        <label>
          Dataset
          <select id="dataset-select"></select>
        </label>
        <span id="response-badge" class="badge"></span>
      </div>
    </header>

    <div id="panel-visualizer" role="tabpanel" aria-labelledby="tab-visualizer">
      <main class="layout">
        <section class="canvas">
          <div id="failure-def-panel" class="failure-def-panel">
            <div class="failure-def-title">Failure Definition</div>
            <p id="failure-def-text" class="failure-def-text muted">No failure definition set.</p>
          </div>
          <svg id="tree" role="img" aria-label="CART tree"></svg>
          <div id="tooltip" class="tooltip" role="tooltip" hidden></div>
        </section>
        <div id="resize-handle" class="resize-handle" role="separator" aria-orientation="vertical" title="Drag to resize panel"></div>
        <aside class="sidebar">
          <section class="panel">
            <h2>Decision path</h2>
            <ol id="breadcrumb" class="breadcrumb"><li class="muted">Hover or click a node.</li></ol>
          </section>
          <section class="panel">
            <h2>Node detail</h2>
            <div id="node-detail" class="node-detail"><p class="muted">Select a node to see details.</p></div>
          </section>
          <section class="panel">
            <h2>Variable importance</h2>
            <ul id="importance" class="importance"></ul>
          </section>
          <section class="panel">
            <h2>Model performance</h2>
            <div id="performance-detail"><p class="muted">No performance data for this dataset.</p></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="panel-about" role="tabpanel" aria-labelledby="tab-about" hidden>
      <div class="about-container">
        <article id="about-content" class="about-content"><p class="muted">Loading…</p></article>
      </div>
    </div>

    <div id="metric-tooltip" class="tooltip metric-tooltip" role="tooltip" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
